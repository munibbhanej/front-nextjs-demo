name: Deploy Next.js to Amplify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Amplify build via webhook
        run: |
          curl -X POST -d {} "${{ secrets.AMPLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json"

      - name: Wait for deploy
        run: echo "Amplify build triggered successfully!"