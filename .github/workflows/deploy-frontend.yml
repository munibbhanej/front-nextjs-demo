name: Deploy Next.js to Amplify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Job 1 - CI (runs first)
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run build check
        run: npm run build

      - name: Run tests (if any)
        run: npm test --if-present

  # Job 2 - CD (runs only if CI passes)
  deploy:
    name: CD - Deploy to Amplify
    runs-on: ubuntu-latest
    needs: ci          # ← waits for ci job to succeed
    if: success()      # ← only runs if ci passed
    steps:
      - name: Trigger Amplify build via webhook
        run: |
          curl -X POST -d {} "${{ secrets.AMPLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json"

      - name: Deployment triggered
        run: echo "✅ Amplify deployment triggered successfully!"